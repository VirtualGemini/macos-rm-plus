included:
  - Sources
  - TestSupport
  - Tests
  - Package.swift

excluded:
  - .build
  - .swiftpm

opt_in_rules:
  - empty_count
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - sorted_imports
  - unneeded_parentheses_in_closure_argument

force_cast: error
force_try: error
force_unwrapping: error
implicitly_unwrapped_optional: error

line_length:
  warning: 100
  error: 120
  ignores_comments: false
  ignores_urls: true

trailing_comma:
  mandatory_comma: true

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

cyclomatic_complexity:
  warning: 10
  error: 15

custom_rules:
  no_unconditional_fatal_error:
    included: "Sources/.*\\.swift"
    name: "No unconditional fatalError"
    regex: "\\bfatalError\\s*\\("
    message: "Production code must return or throw a typed error instead of calling fatalError."
    severity: error

reporter: xcode
